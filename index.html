<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Space Invaders X — Play Free Browser Game</title>
  <meta name="description" content="Classic Space Invaders reinvented with neon particle blasts, power-ups, and boss battles every 5 levels. Play free in your browser!">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #000814;
      overflow: hidden;
      font-family: 'Courier New', Courier, monospace;
      display: flex; flex-direction: column; align-items: center;
    }
    header {
      width: 100%;
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 20px;
      background: #00060f;
      border-bottom: 1px solid rgba(0,245,255,0.2);
      flex-shrink: 0;
    }
    header .title {
      color: #00f5ff; font-size: 15px; font-weight: bold;
      text-shadow: 0 0 10px #00f5ff; letter-spacing: 1px;
    }
    header .links { display: flex; align-items: center; gap: 18px; }
    header a {
      color: #cc44ff; font-size: 12px; text-decoration: none;
      text-shadow: 0 0 6px #cc44ff;
    }
    header a:hover { color: #ffff00; text-shadow: 0 0 8px #ffff00; }
    #startBtn {
      background: #00f5ff22; border: 1px solid #00f5ff55;
      color: #00f5ff; font-family: 'Courier New', monospace;
      font-size: 11px; padding: 4px 12px; cursor: pointer;
      border-radius: 3px; text-shadow: 0 0 5px #00f5ff;
    }
    #startBtn:hover { background: #00f5ff44; }
    #canvasWrap {
      flex: 1; display: flex; align-items: center; justify-content: center;
      width: 100%; overflow: hidden;
    }
    canvas {
      display: block;
      image-rendering: pixelated;
      transform-origin: center center;
    }
  </style>
</head>
<body>
  <header>
    <span class="title">👾 SPACE INVADERS X</span>
    <div class="links">
      <button id="startBtn">NEW GAME</button>
      <a href="https://web-gam-dev.blogspot.com" target="_blank">🎮 More Games at web-gam-dev.blogspot.com</a>
    </div>
  </header>
  <div id="canvasWrap">
    <canvas id="gameCanvas" width="680" height="564"></canvas>
  </div>
  <script>
  // Scale canvas to fit the available space
  (function() {
    var CW = 680, CH = 564;
    function resize() {
      var wrap = document.getElementById('canvasWrap');
      var canvas = document.getElementById('gameCanvas');
      var availW = wrap.clientWidth - 10;
      var availH = wrap.clientHeight - 10;
      var scale = Math.min(availW / CW, availH / CH);
      scale = Math.max(0.4, Math.min(scale, 2.0));
      canvas.style.width = (CW * scale) + 'px';
      canvas.style.height = (CH * scale) + 'px';
    }
    window.addEventListener('resize', resize);
    resize();
  })();
  </script>
  <script>
'use strict';
(function() {
  var canvas = document.getElementById('gameCanvas');
  var ctx = canvas.getContext('2d');
  var W = canvas.width;
  var H = canvas.height;

  // ── Constants ──────────────────────────────────────────
  var COLS = 10, ROWS = 5;
  var AW = 34, AH = 24;
  var APADX = 12, APADY = 14;
  var ALIEN_START_Y = 55;
  var PLAYER_SPD = 310;
  var BULLET_SPD = 490;
  var ABLT_SPD_BASE = 210;
  var FIRE_CD = 0.42;
  var SH_BLOCK = 7;
  var NUM_SHIELDS = 4;
  var SH_COLS = 7, SH_ROWS = 5;

  // ── State ──────────────────────────────────────────────
  var state = 'start';
  var score = 0;
  var hiScore = parseInt(localStorage.getItem('six_hi') || '0');
  var lives = 3;
  var level = 1;

  var player, aliens, bullets, aBullets, shields, particles, powerups, boss;
  var alienDir = 1;
  var alienMoveTimer = 0, alienMoveInterval = 0.6;
  var alienShootTimer = 0, alienShootInterval = 1.5;
  var alienDropPending = false;
  var fireCooldown = 0;
  var activePowerup = null, powerupTimer = 0;
  var bossLevel = false;
  var bossShootTimer = 0;
  var stars = [];
  var animFrame = 0, frameTimer = 0;
  var lastTime = performance.now();
  var keys = {};
  var audioCtx = null;
  var musicPlaying = false, musicScheduler = null;

  // ── Init ────────────────────────────────────────────────
  function init() {
    stars = [];
    for (var i = 0; i < 90; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 1.4 + 0.3,
        spd: Math.random() * 0.6,
        b: Math.random()
      });
    }
    hiScore = parseInt(localStorage.getItem('six_hi') || '0');
    document.addEventListener('keydown', onKey);
    document.addEventListener('keyup', function(e) { keys[e.code] = false; });
    var btn = document.getElementById('startBtn');
    if (btn) btn.addEventListener('click', function() { startGame(); });
    requestAnimationFrame(loop);
  }

  function onKey(e) {
    keys[e.code] = true;
    if (e.code === 'Space' || e.code === 'ArrowUp') e.preventDefault();
    if (state === 'start' && (e.code === 'Enter' || e.code === 'Space')) startGame();
    if (state === 'gameover' && (e.code === 'Enter' || e.code === 'Space')) startGame();
    if (state === 'playing' && e.code === 'KeyP') { state = 'paused'; return; }
    if (state === 'paused' && e.code === 'KeyP') { state = 'playing'; return; }
    if (state === 'paused' && e.code === 'Escape') { state = 'playing'; }
  }

  function startGame() {
    score = 0; lives = 3; level = 1; state = 'playing';
    resetLevel();
    initAudio();
    startMusic();
  }

  function resetLevel() {
    bossLevel = (level % 5 === 0);
    alienDir = 1; alienDropPending = false;
    alienMoveTimer = 0;
    alienMoveInterval = Math.max(0.07, 0.6 - (level - 1) * 0.04);
    alienShootTimer = 0;
    alienShootInterval = Math.max(0.38, 1.5 - (level - 1) * 0.08);
    fireCooldown = 0; activePowerup = null; powerupTimer = 0;
    frameTimer = 0; animFrame = 0;
    aliens = mkAliens();
    shields = mkShields();
    bullets = []; aBullets = []; particles = []; powerups = [];
    boss = bossLevel ? mkBoss() : null;
    player = {
      x: W / 2 - 18, y: H - 68,
      w: 36, h: 28,
      invincible: false, invincibleTimer: 0
    };
  }

  function mkAliens() {
    var list = [];
    var startX = Math.floor((W - (COLS * (AW + APADX) - APADX)) / 2);
    for (var r = 0; r < ROWS; r++) {
      for (var c = 0; c < COLS; c++) {
        var t = r === 0 ? 0 : (r <= 2 ? 1 : 2);
        list.push({
          x: startX + c * (AW + APADX),
          y: ALIEN_START_Y + r * (AH + APADY),
          w: AW, h: AH, type: t, alive: true,
          flash: 0, row: r, col: c,
          pts: t === 0 ? 30 : t === 1 ? 20 : 10
        });
      }
    }
    return list;
  }

  function mkShields() {
    var list = [];
    var sw = SH_COLS * SH_BLOCK;
    var gap = (W - NUM_SHIELDS * sw) / (NUM_SHIELDS + 1);
    for (var s = 0; s < NUM_SHIELDS; s++) {
      var sx = gap + s * (sw + gap);
      var sy = H - 138;
      for (var r = 0; r < SH_ROWS; r++) {
        for (var c = 0; c < SH_COLS; c++) {
          // Arch notch at bottom center
          if (r >= 3 && c >= 2 && c <= 4) continue;
          list.push({ x: sx + c * SH_BLOCK, y: sy + r * SH_BLOCK, w: SH_BLOCK, h: SH_BLOCK, hp: 3 });
        }
      }
    }
    return list;
  }

  function mkBoss() {
    return {
      x: W / 2 - 55, y: 28,
      w: 110, h: 46,
      hp: 6 + level * 2, maxHp: 6 + level * 2,
      dir: 1, spd: 58 + level * 9,
      shootTimer: 0, shootInterval: Math.max(0.45, 2.5 - level * 0.1),
      phase: 0, flash: 0, alive: true
    };
  }

  // ── Game Loop ────────────────────────────────────────────
  function loop(now) {
    var dt = Math.min((now - lastTime) / 1000, 0.05);
    lastTime = now;
    if (state === 'playing') update(dt);
    draw();
    requestAnimationFrame(loop);
  }

  // ── Update ───────────────────────────────────────────────
  function update(dt) {
    frameTimer += dt;
    if (frameTimer >= 0.48) { frameTimer = 0; animFrame ^= 1; }
    updPlayer(dt);
    updBullets(dt);
    updAliens(dt);
    updBoss(dt);
    updParticles(dt);
    updPowerups(dt);
    checkCols();
    var live = aliens.filter(function(a) { return a.alive; });
    if (!bossLevel && live.length === 0) { lvlComplete(); return; }
    if (bossLevel && boss && !boss.alive && live.length === 0) { lvlComplete(); return; }
  }

  function updPlayer(dt) {
    if (player.invincibleTimer > 0) {
      player.invincibleTimer -= dt;
      if (player.invincibleTimer <= 0) player.invincible = false;
    }
    if (powerupTimer > 0) {
      powerupTimer -= dt;
      if (powerupTimer <= 0) activePowerup = null;
    }
    if (fireCooldown > 0) fireCooldown -= dt;
    var spd = PLAYER_SPD * (activePowerup === 'SPEED' ? 1.65 : 1);
    if (keys['ArrowLeft'] || keys['KeyA']) player.x -= spd * dt;
    if (keys['ArrowRight'] || keys['KeyD']) player.x += spd * dt;
    player.x = Math.max(0, Math.min(W - player.w, player.x));
    if ((keys['Space'] || keys['ArrowUp'] || keys['KeyW']) && fireCooldown <= 0) {
      fireCooldown = FIRE_CD;
      var bx = player.x + player.w / 2;
      var by = player.y;
      if (activePowerup === 'MULTI') {
        bullets.push({x:bx,y:by,vx:0,vy:-BULLET_SPD,w:3,h:14});
        bullets.push({x:bx,y:by,vx:-100,vy:-BULLET_SPD,w:3,h:12});
        bullets.push({x:bx,y:by,vx:100,vy:-BULLET_SPD,w:3,h:12});
      } else {
        bullets.push({x:bx,y:by,vx:0,vy:-BULLET_SPD,w:3,h:14});
      }
      snd('shoot');
    }
  }

  function updBullets(dt) {
    bullets = bullets.filter(function(b) {
      b.x += b.vx * dt; b.y += b.vy * dt;
      return b.y > -20 && b.x > -20 && b.x < W + 20;
    });
    aBullets = aBullets.filter(function(b) {
      b.x += b.vx * dt; b.y += b.vy * dt;
      return b.y < H + 20;
    });
  }

  function updAliens(dt) {
    alienMoveTimer += dt; alienShootTimer += dt;
    var live = aliens.filter(function(a) { return a.alive; });
    if (live.length === 0) return;
    aliens.forEach(function(a) { if (a.flash > 0) a.flash -= dt; });

    var frac = Math.max(0.15, live.length / (COLS * ROWS));
    var interval = alienMoveInterval * frac;

    if (alienMoveTimer >= interval) {
      alienMoveTimer = 0;
      if (alienDropPending) {
        aliens.forEach(function(a) { if (a.alive) a.y += 20; });
        alienDir = -alienDir; alienDropPending = false;
      } else {
        var step = 14;
        aliens.forEach(function(a) { if (a.alive) a.x += alienDir * step; });
        var minX = Infinity, maxX = -Infinity;
        live.forEach(function(a) { minX = Math.min(minX, a.x); maxX = Math.max(maxX, a.x + a.w); });
        if (maxX >= W - 2 || minX <= 2) alienDropPending = true;
      }
    }

    if (alienShootTimer >= alienShootInterval) {
      alienShootTimer = 0;
      var front = [];
      for (var c = 0; c < COLS; c++) {
        var colA = live.filter(function(a) { return a.col === c; });
        if (colA.length) {
          front.push(colA.reduce(function(a, b) { return a.y > b.y ? a : b; }));
        }
      }
      if (front.length) {
        var sh = front[Math.floor(Math.random() * front.length)];
        var spd = ABLT_SPD_BASE + level * 8;
        aBullets.push({x: sh.x + sh.w/2 - 2, y: sh.y + sh.h, vx: 0, vy: spd, w: 4, h: 12, boss: false});
        snd('ashoot');
      }
    }

    var lowestY = live.reduce(function(m, a) { return Math.max(m, a.y + a.h); }, 0);
    if (lowestY >= player.y) killPlayer();
  }

  function updBoss(dt) {
    if (!boss || !boss.alive) return;
    boss.shootTimer += dt;
    if (boss.flash > 0) boss.flash -= dt;
    boss.x += boss.dir * boss.spd * dt;
    if (boss.x <= 0) { boss.x = 0; boss.dir = 1; }
    if (boss.x + boss.w >= W) { boss.x = W - boss.w; boss.dir = -1; }
    if (boss.shootTimer >= boss.shootInterval) {
      boss.shootTimer = 0;
      boss.phase = (boss.phase + 1) % 3;
      var bx = boss.x + boss.w / 2, by = boss.y + boss.h;
      if (boss.phase === 0) {
        var dx = (player.x + player.w/2) - bx;
        var dy = player.y - by;
        var len = Math.sqrt(dx*dx + dy*dy) || 1;
        aBullets.push({x:bx,y:by,vx:dx/len*300,vy:dy/len*300,w:7,h:7,boss:true});
      } else if (boss.phase === 1) {
        for (var i = -2; i <= 2; i++) {
          aBullets.push({x:bx,y:by,vx:i*85,vy:270,w:5,h:14,boss:true});
        }
      } else {
        for (var j = 0; j < 4; j++) {
          aBullets.push({x:boss.x+Math.random()*boss.w,y:by,vx:(Math.random()-0.5)*130,vy:290+Math.random()*60,w:5,h:12,boss:true});
        }
      }
      snd('bshoot');
    }
  }

  function updParticles(dt) {
    particles = particles.filter(function(p) {
      p.x += p.vx * dt; p.y += p.vy * dt;
      p.vy += 55 * dt;
      p.life -= dt; p.r -= p.decay * dt;
      return p.life > 0 && p.r > 0.2;
    });
  }

  function updPowerups(dt) {
    powerups = powerups.filter(function(p) {
      p.y += 85 * dt; p.life -= dt;
      return p.y < H && p.life > 0;
    });
  }

  // ── Collisions ─────────────────────────────────────────
  function checkCols() {
    // Player bullets vs aliens
    for (var bi = bullets.length - 1; bi >= 0; bi--) {
      var b = bullets[bi];
      for (var ai = 0; ai < aliens.length; ai++) {
        var a = aliens[ai];
        if (!a.alive) continue;
        if (hit(b.x - b.w/2, b.y, b.w, b.h, a.x, a.y, a.w, a.h)) {
          bullets.splice(bi, 1);
          a.alive = false;
          score += a.pts;
          if (score > hiScore) { hiScore = score; localStorage.setItem('six_hi', hiScore); }
          explode(a.x + a.w/2, a.y + a.h/2, aclr(a.type), 12);
          snd('adie');
          if (Math.random() < 0.13) dropPU(a.x + a.w/2, a.y + a.h/2);
          break;
        }
      }
    }
    // Player bullets vs boss
    if (boss && boss.alive) {
      for (var bi2 = bullets.length - 1; bi2 >= 0; bi2--) {
        var bb = bullets[bi2];
        if (hit(bb.x - bb.w/2, bb.y, bb.w, bb.h, boss.x, boss.y, boss.w, boss.h)) {
          bullets.splice(bi2, 1);
          boss.hp--; boss.flash = 0.14;
          explode(bb.x, bb.y, '#ffcc00', 5);
          snd('bhit');
          if (boss.hp <= 0) {
            boss.alive = false;
            score += 500 + level * 120;
            if (score > hiScore) { hiScore = score; localStorage.setItem('six_hi', hiScore); }
            explode(boss.x + boss.w/2, boss.y + boss.h/2, '#ffcc00', 35);
            for (var pi = 0; pi < 3; pi++) dropPU(boss.x + Math.random()*boss.w, boss.y + boss.h);
            snd('bdie');
          }
        }
      }
    }
    // Player bullets vs shields
    for (var bi3 = bullets.length - 1; bi3 >= 0; bi3--) {
      var bs = bullets[bi3];
      for (var si = 0; si < shields.length; si++) {
        var s = shields[si];
        if (s.hp <= 0) continue;
        if (hit(bs.x - bs.w/2, bs.y, bs.w, bs.h, s.x, s.y, s.w, s.h)) {
          bullets.splice(bi3, 1);
          s.hp--;
          break;
        }
      }
    }
    // Alien bullets vs player
    if (!player.invincible) {
      for (var abi = aBullets.length - 1; abi >= 0; abi--) {
        var ab = aBullets[abi];
        if (hit(ab.x, ab.y, ab.w, ab.h, player.x + 4, player.y, player.w - 8, player.h)) {
          aBullets.splice(abi, 1);
          killPlayer(); break;
        }
      }
    }
    // Alien bullets vs shields
    for (var abi2 = aBullets.length - 1; abi2 >= 0; abi2--) {
      var ab2 = aBullets[abi2];
      for (var si2 = 0; si2 < shields.length; si2++) {
        var s2 = shields[si2];
        if (s2.hp <= 0) continue;
        if (hit(ab2.x, ab2.y, ab2.w, ab2.h, s2.x, s2.y, s2.w, s2.h)) {
          aBullets.splice(abi2, 1);
          s2.hp--; break;
        }
      }
    }
    // Power-ups vs player
    for (var pui = powerups.length - 1; pui >= 0; pui--) {
      var pu = powerups[pui];
      if (hit(pu.x - 12, pu.y - 10, 24, 20, player.x, player.y, player.w, player.h)) {
        collectPU(pu.type);
        powerups.splice(pui, 1);
      }
    }
  }

  function hit(ax, ay, aw, ah, bx, by, bw, bh) {
    return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
  }

  function killPlayer() {
    if (player.invincible) return;
    explode(player.x + player.w/2, player.y + player.h/2, '#00f5ff', 22);
    snd('pdie');
    lives--;
    if (lives <= 0) { state = 'gameover'; stopMusic(); return; }
    player.x = W/2 - player.w/2;
    player.invincible = true; player.invincibleTimer = 3;
    bullets = [];
  }

  function explode(x, y, clr, n) {
    var cols = [clr, '#ffffff', '#ff9900', '#ffcc00'];
    for (var i = 0; i < n; i++) {
      var angle = Math.random() * Math.PI * 2;
      var spd = 40 + Math.random() * 150;
      particles.push({
        x: x, y: y,
        vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd,
        r: 2 + Math.random() * 4, decay: 2 + Math.random() * 4,
        life: 0.4 + Math.random() * 0.5,
        clr: cols[Math.floor(Math.random() * cols.length)]
      });
    }
  }

  function dropPU(x, y) {
    var types = ['MULTI', 'SPEED', 'SHIELD', 'BOMB'];
    powerups.push({ x: x, y: y, type: types[Math.floor(Math.random() * 4)], life: 8 });
  }

  function collectPU(type) {
    snd('pu');
    if (type === 'BOMB') {
      aliens.forEach(function(a) {
        if (a.alive) {
          a.alive = false;
          score += a.pts;
          explode(a.x + a.w/2, a.y + a.h/2, aclr(a.type), 5);
        }
      });
      if (score > hiScore) { hiScore = score; localStorage.setItem('six_hi', hiScore); }
      return;
    }
    if (type === 'SHIELD') {
      player.invincible = true; player.invincibleTimer = 6;
      activePowerup = 'SHIELD'; powerupTimer = 6; return;
    }
    activePowerup = type; powerupTimer = 8;
  }

  function lvlComplete() {
    state = 'levelcomplete';
    stopMusic();
    snd('lvcomplete');
    level++;
    setTimeout(function() {
      if (state === 'levelcomplete') {
        state = 'playing';
        resetLevel();
        startMusic();
      }
    }, 2600);
  }

  function aclr(type) {
    return type === 0 ? '#00ff88' : type === 1 ? '#cc44ff' : '#ff6600';
  }

  // ── Audio ────────────────────────────────────────────────
  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }

  function snd(type) {
    if (!audioCtx) return;
    try {
      var t = audioCtx.currentTime;
      switch(type) {
        case 'shoot': {
          var o = audioCtx.createOscillator();
          var g = audioCtx.createGain();
          o.connect(g); g.connect(audioCtx.destination);
          o.type = 'square';
          o.frequency.setValueAtTime(900, t);
          o.frequency.exponentialRampToValueAtTime(200, t + 0.09);
          g.gain.setValueAtTime(0.14, t);
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.09);
          o.start(t); o.stop(t + 0.09); break;
        }
        case 'adie': {
          var bufLen = Math.floor(audioCtx.sampleRate * 0.14);
          var buf = audioCtx.createBuffer(1, bufLen, audioCtx.sampleRate);
          var d = buf.getChannelData(0);
          for (var i = 0; i < bufLen; i++) d[i] = (Math.random()*2-1)*(1 - i/bufLen);
          var src = audioCtx.createBufferSource();
          var g2 = audioCtx.createGain();
          var f = audioCtx.createBiquadFilter();
          src.buffer = buf;
          src.connect(f); f.connect(g2); g2.connect(audioCtx.destination);
          f.type = 'bandpass'; f.frequency.value = 350 + Math.random()*400; f.Q.value = 1.5;
          g2.gain.setValueAtTime(0.28, t);
          g2.gain.exponentialRampToValueAtTime(0.001, t + 0.14);
          src.start(t); src.stop(t + 0.14); break;
        }
        case 'ashoot': {
          var o2 = audioCtx.createOscillator();
          var g3 = audioCtx.createGain();
          o2.connect(g3); g3.connect(audioCtx.destination);
          o2.type = 'sawtooth';
          o2.frequency.setValueAtTime(220, t);
          o2.frequency.linearRampToValueAtTime(70, t + 0.18);
          g3.gain.setValueAtTime(0.07, t);
          g3.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
          o2.start(t); o2.stop(t + 0.18); break;
        }
        case 'pdie': {
          var o3 = audioCtx.createOscillator();
          var g4 = audioCtx.createGain();
          o3.connect(g4); g4.connect(audioCtx.destination);
          o3.type = 'sawtooth';
          o3.frequency.setValueAtTime(440, t);
          o3.frequency.exponentialRampToValueAtTime(50, t + 0.9);
          g4.gain.setValueAtTime(0.3, t);
          g4.gain.exponentialRampToValueAtTime(0.001, t + 0.9);
          o3.start(t); o3.stop(t + 0.9); break;
        }
        case 'pu': {
          [440,550,660,880].forEach(function(freq, idx) {
            var pu_o = audioCtx.createOscillator();
            var pu_g = audioCtx.createGain();
            pu_o.connect(pu_g); pu_g.connect(audioCtx.destination);
            pu_o.type = 'square'; pu_o.frequency.value = freq;
            var st = t + idx * 0.075;
            pu_g.gain.setValueAtTime(0.001, st);
            pu_g.gain.linearRampToValueAtTime(0.16, st + 0.025);
            pu_g.gain.exponentialRampToValueAtTime(0.001, st + 0.1);
            pu_o.start(st); pu_o.stop(st + 0.1);
          }); break;
        }
        case 'bhit': {
          var bh_o = audioCtx.createOscillator();
          var bh_g = audioCtx.createGain();
          bh_o.connect(bh_g); bh_g.connect(audioCtx.destination);
          bh_o.type = 'square';
          bh_o.frequency.setValueAtTime(130, t);
          bh_o.frequency.linearRampToValueAtTime(80, t + 0.16);
          bh_g.gain.setValueAtTime(0.22, t);
          bh_g.gain.exponentialRampToValueAtTime(0.001, t + 0.16);
          bh_o.start(t); bh_o.stop(t + 0.16); break;
        }
        case 'bshoot': {
          var bs_o = audioCtx.createOscillator();
          var bs_g = audioCtx.createGain();
          bs_o.connect(bs_g); bs_g.connect(audioCtx.destination);
          bs_o.type = 'sawtooth';
          bs_o.frequency.setValueAtTime(320, t);
          bs_o.frequency.linearRampToValueAtTime(55, t + 0.28);
          bs_g.gain.setValueAtTime(0.12, t);
          bs_g.gain.exponentialRampToValueAtTime(0.001, t + 0.28);
          bs_o.start(t); bs_o.stop(t + 0.28); break;
        }
        case 'bdie': {
          [0,200,400,600,800].forEach(function(delay) {
            setTimeout(function() {
              if (!audioCtx) return;
              var tc = audioCtx.currentTime;
              var bl = Math.floor(audioCtx.sampleRate * 0.32);
              var bb = audioCtx.createBuffer(1, bl, audioCtx.sampleRate);
              var dd = bb.getChannelData(0);
              for (var k = 0; k < bl; k++) dd[k] = (Math.random()*2-1)*(1-k/bl);
              var bsrc = audioCtx.createBufferSource();
              var bg = audioCtx.createGain();
              var bf = audioCtx.createBiquadFilter();
              bsrc.buffer = bb;
              bsrc.connect(bf); bf.connect(bg); bg.connect(audioCtx.destination);
              bf.type = 'lowpass'; bf.frequency.value = 700;
              bg.gain.value = 0.38;
              bsrc.start(tc); bsrc.stop(tc + 0.32);
            }, delay);
          }); break;
        }
        case 'lvcomplete': {
          [262,330,392,523,659,784,1047].forEach(function(freq, idx) {
            var lc_o = audioCtx.createOscillator();
            var lc_g = audioCtx.createGain();
            lc_o.connect(lc_g); lc_g.connect(audioCtx.destination);
            lc_o.type = 'square'; lc_o.frequency.value = freq;
            var st = t + idx * 0.1;
            lc_g.gain.setValueAtTime(0.001, st);
            lc_g.gain.linearRampToValueAtTime(0.2, st + 0.04);
            lc_g.gain.exponentialRampToValueAtTime(0.001, st + 0.22);
            lc_o.start(st); lc_o.stop(st + 0.22);
          }); break;
        }
      }
    } catch(e) {}
  }

  // Background music - chiptune sequencer
  var MELODY = [
    [659,0.25],[659,0.25],[0,0.25],[659,0.25],[0,0.25],[523,0.25],[659,0.5],[784,0.5],
    [0,0.5],[392,0.5],[0,0.5],[523,0.375],[0,0.125],[392,0.375],[0,0.125],[330,0.5],
    [440,0.25],[494,0.25],[466,0.125],[440,0.25],[392,0.1875],[659,0.1875],[784,0.1875],[880,0.25],
    [698,0.25],[784,0.25],[0,0.125],[659,0.25],[523,0.125],[587,0.125],[494,0.25],[0,0.5]
  ];
  var BASS = [130,98,110,98,130,98,110,98,146,116,123,116];

  function startMusic() {
    if (musicPlaying || !audioCtx) return;
    musicPlaying = true;
    scheduleMelody();
  }

  function scheduleMelody() {
    if (!musicPlaying || !audioCtx) return;
    var master = audioCtx.createGain();
    master.gain.value = 0.11;
    master.connect(audioCtx.destination);
    var t = audioCtx.currentTime + 0.05;
    var total = 0;
    MELODY.forEach(function(note, idx) {
      var freq = note[0], dur = note[1];
      if (freq > 0) {
        var o = audioCtx.createOscillator();
        var g = audioCtx.createGain();
        o.connect(g); g.connect(master);
        o.type = 'square'; o.frequency.value = freq;
        g.gain.setValueAtTime(0.001, t + total);
        g.gain.linearRampToValueAtTime(0.5, t + total + 0.015);
        g.gain.setValueAtTime(0.5, t + total + dur - 0.04);
        g.gain.linearRampToValueAtTime(0.001, t + total + dur);
        o.start(t + total); o.stop(t + total + dur);
      }
      if (idx % 2 === 0) {
        var bfreq = BASS[Math.floor(total * 4) % BASS.length];
        var bo = audioCtx.createOscillator();
        var bg = audioCtx.createGain();
        bo.connect(bg); bg.connect(master);
        bo.type = 'triangle'; bo.frequency.value = bfreq;
        bg.gain.setValueAtTime(0.001, t + total);
        bg.gain.linearRampToValueAtTime(0.35, t + total + 0.02);
        bg.gain.exponentialRampToValueAtTime(0.001, t + total + Math.min(dur, 0.45));
        bo.start(t + total); bo.stop(t + total + Math.min(dur, 0.45));
      }
      total += dur;
    });
    if (musicPlaying) {
      musicScheduler = setTimeout(scheduleMelody, total * 1000 - 120);
    }
  }

  function stopMusic() {
    musicPlaying = false;
    if (musicScheduler) clearTimeout(musicScheduler);
    musicScheduler = null;
  }

  // ── Draw ────────────────────────────────────────────────
  function draw() {
    ctx.fillStyle = '#000814';
    ctx.fillRect(0, 0, W, H);
    drawStars();
    if (state === 'start') { drawStart(); return; }
    if (state === 'gameover') { drawGameOver(); return; }
    drawShields();
    drawPowerups();
    drawAliens();
    if (boss) drawBoss();
    drawPlayer();
    drawBullets();
    drawParticles();
    drawHUD();
    if (state === 'levelcomplete') drawLVLComplete();
    if (state === 'paused') drawPaused();
  }

  function drawStars() {
    var now = performance.now() * 0.001;
    stars.forEach(function(s) {
      var tw = 0.35 + 0.65 * Math.abs(Math.sin(now * (0.5 + s.b * 2) + s.x));
      ctx.fillStyle = 'rgba(255,255,255,' + (tw * 0.85) + ')';
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r * tw, 0, Math.PI * 2);
      ctx.fill();
    });
  }

  function drawAliens() {
    aliens.forEach(function(a) {
      if (!a.alive) return;
      ctx.save();
      var clr = a.flash > 0 ? '#ffffff' : aclr(a.type);
      ctx.shadowColor = clr; ctx.shadowBlur = 10;
      drawAlienShape(a.x, a.y, a.w, a.h, a.type, clr, animFrame);
      ctx.restore();
    });
  }

  function drawAlienShape(x, y, w, h, type, clr, fr) {
    ctx.fillStyle = clr;
    if (type === 0) {
      // Green squid - top row
      ctx.fillRect(x+w*0.22, y+h*0.1, w*0.56, h*0.65);
      // Head bumps
      ctx.fillRect(x+w*0.12, y+h*0.2, w*0.12, h*0.35);
      ctx.fillRect(x+w*0.76, y+h*0.2, w*0.12, h*0.35);
      // Antennae
      if (fr === 0) {
        ctx.fillRect(x+w*0.25, y, 3, h*0.18);
        ctx.fillRect(x+w*0.68, y, 3, h*0.18);
      } else {
        ctx.fillRect(x+w*0.18, y-3, 3, h*0.22);
        ctx.fillRect(x+w*0.75, y-3, 3, h*0.22);
      }
      // Tentacles
      for (var i = 0; i < 4; i++) {
        ctx.fillRect(x + w*0.1 + i*w*0.24, y+h*0.72, 4, fr===0?h*0.3:h*0.24);
      }
      // Eyes
      ctx.fillStyle = '#000814';
      ctx.fillRect(x+w*0.3, y+h*0.28, 5, 5);
      ctx.fillRect(x+w*0.6, y+h*0.28, 5, 5);

    } else if (type === 1) {
      // Purple crab - middle rows
      ctx.fillRect(x+w*0.28, y+h*0.08, w*0.44, h*0.78);
      // Claws
      if (fr === 0) {
        ctx.fillRect(x, y+h*0.18, w*0.32, h*0.46);
        ctx.fillRect(x+w*0.68, y+h*0.18, w*0.32, h*0.46);
        ctx.fillRect(x, y+h*0.12, w*0.15, h*0.12);
        ctx.fillRect(x+w*0.85, y+h*0.12, w*0.15, h*0.12);
      } else {
        ctx.fillRect(x-w*0.07, y+h*0.08, w*0.32, h*0.5);
        ctx.fillRect(x+w*0.75, y+h*0.08, w*0.32, h*0.5);
        ctx.fillRect(x-w*0.07, y+h*0.02, w*0.15, h*0.12);
        ctx.fillRect(x+w*0.92, y+h*0.02, w*0.15, h*0.12);
      }
      // Eyes
      ctx.fillStyle = '#000814';
      ctx.fillRect(x+w*0.38, y+h*0.22, 5, 5);
      ctx.fillRect(x+w*0.56, y+h*0.22, 5, 5);
      // Legs
      ctx.fillStyle = clr;
      for (var j = 0; j < 4; j++) {
        ctx.fillRect(x+w*0.28+j*w*0.13, y+h*0.85, 3, fr===0?h*0.2:h*0.14);
      }

    } else {
      // Orange UFO - bottom rows
      ctx.beginPath();
      ctx.ellipse(x+w/2, y+h*0.62, w*0.46, h*0.3, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(x+w/2, y+h*0.44, w*0.28, h*0.27, 0, Math.PI, 0);
      ctx.fill();
      // Lights
      ctx.fillStyle = fr === 0 ? '#ffff44' : '#ff4400';
      [w*0.22, w*0.47, w*0.72].forEach(function(lx) {
        ctx.beginPath();
        ctx.arc(x+lx, y+h*0.62, 3.5, 0, Math.PI*2);
        ctx.fill();
      });
      // Underside detail
      ctx.fillStyle = clr;
      [x+w*0.12, x+w*0.44, x+w*0.74].forEach(function(cx) {
        ctx.fillRect(cx, y+h*0.88, 5, fr===0?4:7);
      });
    }
  }

  function drawBoss() {
    if (!boss.alive) return;
    var b = boss;
    var alpha = b.flash > 0 ? (Math.floor(b.flash * 28) % 2 === 0 ? 0.25 : 1) : 1;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.shadowColor = '#ffcc00'; ctx.shadowBlur = 22;
    // Wings
    ctx.fillStyle = '#cc8800';
    ctx.beginPath();
    ctx.moveTo(b.x, b.y+b.h/2);
    ctx.lineTo(b.x+22, b.y+8); ctx.lineTo(b.x+22, b.y+b.h-5);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(b.x+b.w, b.y+b.h/2);
    ctx.lineTo(b.x+b.w-22, b.y+8); ctx.lineTo(b.x+b.w-22, b.y+b.h-5);
    ctx.closePath(); ctx.fill();
    // Body
    ctx.fillStyle = '#ffcc00';
    ctx.fillRect(b.x+18, b.y+5, b.w-36, b.h-8);
    // Cockpit
    ctx.fillStyle = '#ff4400';
    ctx.beginPath();
    ctx.ellipse(b.x+b.w/2, b.y+b.h/2-2, 19, 13, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#ffaa44';
    ctx.beginPath();
    ctx.ellipse(b.x+b.w/2-4, b.y+b.h/2-5, 7, 5, -0.4, 0, Math.PI*2);
    ctx.fill();
    // Cannons
    ctx.fillStyle = '#885500';
    [b.x+22, b.x+b.w/2-7, b.x+b.w-34].forEach(function(cx) {
      ctx.fillRect(cx, b.y+b.h-4, 14, 11);
    });
    // HP bar
    ctx.fillStyle = '#222';
    ctx.fillRect(b.x, b.y-14, b.w, 9);
    var hpFrac = b.hp / b.maxHp;
    ctx.fillStyle = hpFrac > 0.5 ? '#00ff44' : hpFrac > 0.25 ? '#ffaa00' : '#ff2200';
    ctx.fillRect(b.x, b.y-14, b.w * hpFrac, 9);
    ctx.strokeStyle = '#ffcc00'; ctx.lineWidth = 1;
    ctx.strokeRect(b.x, b.y-14, b.w, 9);
    ctx.restore();
  }

  function drawPlayer() {
    var p = player;
    if (p.invincible && Math.floor(performance.now() / 90) % 2 === 0) return;
    var cx = p.x + p.w / 2;
    ctx.save();
    ctx.shadowColor = '#00f5ff'; ctx.shadowBlur = 14;
    ctx.fillStyle = '#00f5ff';
    // Fuselage
    ctx.beginPath();
    ctx.moveTo(cx, p.y);
    ctx.lineTo(p.x+p.w-3, p.y+p.h);
    ctx.lineTo(p.x+3, p.y+p.h);
    ctx.closePath(); ctx.fill();
    // Wings
    ctx.fillRect(p.x, p.y+p.h*0.55, 9, p.h*0.45);
    ctx.fillRect(p.x+p.w-9, p.y+p.h*0.55, 9, p.h*0.45);
    // Cockpit
    ctx.fillStyle = '#0088aa';
    ctx.beginPath();
    ctx.ellipse(cx, p.y+p.h*0.45, 5, 8, 0, 0, Math.PI*2);
    ctx.fill();
    // Engine flame
    ctx.shadowColor = '#ff6600'; ctx.shadowBlur = 10;
    ctx.fillStyle = '#ff6600';
    var flicker = Math.random() * 8 + 4;
    ctx.fillRect(cx-5, p.y+p.h, 10, flicker);
    ctx.fillStyle = '#ffcc00';
    ctx.fillRect(cx-3, p.y+p.h, 6, flicker*0.6);
    // Shield ring
    if (p.invincible) {
      ctx.strokeStyle = 'rgba(0,245,255,0.55)';
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.ellipse(cx, p.y+p.h/2, p.w/2+8, p.h/2+8, 0, 0, Math.PI*2);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawShields() {
    shields.forEach(function(s) {
      if (s.hp <= 0) return;
      ctx.globalAlpha = s.hp === 3 ? 1 : s.hp === 2 ? 0.65 : 0.35;
      ctx.fillStyle = '#00ccff';
      ctx.shadowColor = '#00ccff'; ctx.shadowBlur = 3;
      ctx.fillRect(s.x, s.y, s.w-1, s.h-1);
    });
    ctx.globalAlpha = 1; ctx.shadowBlur = 0;
  }

  function drawBullets() {
    ctx.save();
    bullets.forEach(function(b) {
      ctx.fillStyle = '#ffff00'; ctx.shadowColor = '#ffff00'; ctx.shadowBlur = 9;
      ctx.fillRect(b.x - b.w/2, b.y, b.w, b.h);
    });
    aBullets.forEach(function(b) {
      ctx.fillStyle = b.boss ? '#ff00ff' : '#ff3333';
      ctx.shadowColor = ctx.fillStyle; ctx.shadowBlur = 7;
      if (b.boss) {
        ctx.beginPath();
        ctx.arc(b.x + b.w/2, b.y + b.h/2, b.w, 0, Math.PI*2);
        ctx.fill();
      } else {
        ctx.fillRect(b.x, b.y, b.w, b.h);
      }
    });
    ctx.restore();
  }

  function drawParticles() {
    ctx.save();
    particles.forEach(function(p) {
      ctx.globalAlpha = Math.min(1, p.life * 2.8);
      ctx.fillStyle = p.clr;
      ctx.shadowColor = p.clr; ctx.shadowBlur = 5;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fill();
    });
    ctx.globalAlpha = 1; ctx.shadowBlur = 0;
    ctx.restore();
  }

  function drawPowerups() {
    var now = performance.now();
    var puColors = { MULTI:'#00ff00', SPEED:'#00ffff', SHIELD:'#4488ff', BOMB:'#ff4400' };
    var puLabels = { MULTI:'3X', SPEED:'SPD', SHIELD:'SHD', BOMB:'BOM' };
    powerups.forEach(function(p) {
      var clr = puColors[p.type];
      var pulse = 0.65 + 0.35 * Math.sin(now * 0.007);
      ctx.save();
      ctx.globalAlpha = pulse;
      ctx.fillStyle = clr; ctx.shadowColor = clr; ctx.shadowBlur = 14;
      ctx.beginPath();
      ctx.roundRect(p.x-14, p.y-10, 28, 22, 5);
      ctx.fill();
      ctx.fillStyle = '#000814'; ctx.shadowBlur = 0;
      ctx.font = 'bold 9px monospace';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(puLabels[p.type], p.x, p.y+1);
      ctx.restore();
    });
  }

  function drawHUD() {
    ctx.save();
    ctx.shadowColor = '#00f5ff'; ctx.shadowBlur = 7;
    ctx.fillStyle = '#00f5ff';
    ctx.font = 'bold 13px "Courier New",monospace';
    ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    ctx.fillText('SCORE ' + score, 8, 8);
    ctx.textAlign = 'center';
    ctx.fillText('HI ' + hiScore, W/2, 8);
    ctx.textAlign = 'right';
    var hearts = '';
    for (var li = 0; li < lives; li++) hearts += '\u2665 ';
    ctx.fillText(hearts.trim(), W-8, 8);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#cc44ff';
    ctx.fillText('LVL ' + level + (bossLevel?' \u26A0 BOSS':' '), W/2, H-16);
    if (activePowerup && activePowerup !== 'BOMB') {
      var puColors2 = { MULTI:'#00ff00', SPEED:'#00ffff', SHIELD:'#4488ff' };
      ctx.fillStyle = puColors2[activePowerup] || '#ffffff';
      ctx.shadowColor = ctx.fillStyle;
      ctx.textAlign = 'left';
      ctx.font = 'bold 11px monospace';
      ctx.fillText('[' + activePowerup + '] ' + Math.ceil(powerupTimer) + 's', 8, H-16);
    }
    ctx.restore();
  }

  function drawStart() {
    ctx.save();
    // Title
    ctx.shadowColor = '#00f5ff'; ctx.shadowBlur = 28;
    ctx.fillStyle = '#00f5ff';
    ctx.font = 'bold 40px "Courier New",monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
    ctx.fillText('SPACE INVADERS X', W/2, 130);
    ctx.shadowColor = '#cc44ff'; ctx.shadowBlur = 12;
    ctx.fillStyle = '#cc44ff';
    ctx.font = '13px "Courier New",monospace';
    ctx.fillText('POWER-UPS  \u2022  BOSS WAVES  \u2022  NEON PARTICLE BLASTS', W/2, 162);
    // Alien score guide
    var guide = [
      {clr:'#00ff88', type:0, label:'= 30 PTS'},
      {clr:'#cc44ff', type:1, label:'= 20 PTS'},
      {clr:'#ff6600', type:2, label:'= 10 PTS'},
    ];
    guide.forEach(function(g, i) {
      ctx.shadowColor = g.clr; ctx.shadowBlur = 8;

      ctx.fillStyle = g.clr;
      ctx.font = '12px "Courier New",monospace';
      ctx.textAlign = 'left';
      ctx.fillText(g.label, W/2 - 74, 202 + i*38 + 16);
    });
    // Power-up guide
    ctx.shadowColor = '#ffffff'; ctx.shadowBlur = 4;
    ctx.fillStyle = '#aaaaaa';
    ctx.font = '11px monospace'; ctx.textAlign = 'center';
    ctx.fillText('POWER-UPS:  [3X] MULTI-SHOT   [SPD] SPEED   [SHD] SHIELD   [BOM] BOMB', W/2, 340);
    ctx.fillStyle = '#ffcc44'; ctx.shadowColor = '#ffcc44'; ctx.shadowBlur = 6;
    ctx.fillText('\u26A0 BOSS BATTLE EVERY 5 LEVELS!', W/2, 368);
    ctx.fillStyle = '#888'; ctx.shadowBlur = 0;
    ctx.font = '11px monospace';
    ctx.fillText('\u2190 \u2192  MOVE    SPACE / \u2191  SHOOT    P  PAUSE', W/2, 400);
    // Pulsing start prompt
    var pulse = 0.4 + 0.6 * Math.abs(Math.sin(performance.now() * 0.003));
    ctx.globalAlpha = pulse;
    ctx.shadowColor = '#ffff00'; ctx.shadowBlur = 14;
    ctx.fillStyle = '#ffff00';
    ctx.font = 'bold 15px "Courier New",monospace';
    ctx.fillText('PRESS ENTER OR CLICK START', W/2, 448);
    ctx.globalAlpha = 1;
    ctx.restore();

  function drawGameOver() {
    ctx.save();
    ctx.shadowColor = '#ff2200'; ctx.shadowBlur = 35;
    ctx.fillStyle = '#ff2200';
    ctx.font = 'bold 54px "Courier New",monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
    ctx.fillText('GAME OVER', W/2, H/2 - 55);
    ctx.shadowColor = '#ffff00'; ctx.shadowBlur = 10;
    ctx.fillStyle = '#ffff00';
    ctx.font = 'bold 20px monospace';
    ctx.fillText('SCORE: ' + score, W/2, H/2 + 5);
    ctx.fillText('BEST:  ' + hiScore, W/2, H/2 + 35);
    var pulse = 0.4 + 0.6 * Math.abs(Math.sin(performance.now() * 0.003));
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#ffffff'; ctx.shadowBlur = 5;
    ctx.font = '14px monospace';
    ctx.fillText('PRESS ENTER TO PLAY AGAIN', W/2, H/2 + 88);
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  function drawLVLComplete() {
    ctx.save();
    ctx.fillStyle = 'rgba(0,8,20,0.55)';
    ctx.fillRect(0, 0, W, H);
    ctx.shadowColor = '#00ff88'; ctx.shadowBlur = 24;
    ctx.fillStyle = '#00ff88';
    ctx.font = 'bold 38px "Courier New",monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
    ctx.fillText('LEVEL ' + (level - 1) + ' CLEAR!', W/2, H/2 - 24);
    ctx.shadowBlur = 8;
    ctx.font = '15px monospace';
    ctx.fillStyle = '#ccffee';
    ctx.fillText('GET READY FOR LEVEL ' + level + (level%5===0?' \u2014 BOSS!':''), W/2, H/2+22);
    ctx.restore();
  }

  function drawPaused() {
    ctx.save();
    ctx.fillStyle = 'rgba(0,8,20,0.72)';
    ctx.fillRect(0, 0, W, H);
    ctx.shadowColor = '#00f5ff'; ctx.shadowBlur = 22;
    ctx.fillStyle = '#00f5ff';
    ctx.font = 'bold 44px "Courier New",monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
    ctx.fillText('PAUSED', W/2, H/2 + 8);
    ctx.shadowBlur = 5;
    ctx.font = '13px monospace';
    ctx.fillStyle = '#aaaaaa';
    ctx.fillText('Press P to resume', W/2, H/2 + 40);
    ctx.restore();
  }

  init();
})();
  </script>
</body>
</html>
